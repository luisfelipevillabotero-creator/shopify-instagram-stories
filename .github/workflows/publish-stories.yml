name: Publicar Instagram Stories

on:
  schedule:
    # 6:00 AM hora Colombia (UTC-5) = 11:00 UTC (+~2h delay GH Actions = ~8AM COT)
    - cron: '0 11 * * *'
    # 5:00 PM hora Colombia (UTC-5) = 22:00 UTC (+~2h delay GH Actions = ~7PM COT)
    - cron: '0 22 * * *'
  workflow_dispatch: # Permite ejecucion manual para pruebas
    inputs:
      count:
        description: 'Numero de publicaciones (0 = automatico por turno)'
        required: false
        default: '0'
      slot:
        description: 'Forzar turno (morning/evening, vacio = auto)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  publish-story:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias de sistema para canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libjpeg-dev \
            libpango1.0-dev \
            libgif-dev \
            librsvg2-dev

      - name: Instalar dependencias npm
        run: npm ci

      - name: Ejecutar publicador de stories
        env:
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_STORE_URL: ${{ secrets.SHOPIFY_STORE_URL }}
          SHOPIFY_COLLECTION_HANDLE: ${{ secrets.SHOPIFY_COLLECTION_HANDLE }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_COUNT: ${{ inputs.count || '0' }}
          SLOT: ${{ inputs.slot || '' }}
        run: node src/index.js

      - name: Commit historial actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data/posted-history.json /tmp/posted-history.json
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/posted-history.json data/posted-history.json
          git add data/posted-history.json
          git diff --staged --quiet || git commit -m "Actualizar historial de publicaciones [skip ci]"
          git push origin main
